<!DOCTYPE html>
<html>
<head>
    <title>Bridge Client</title>
</head>
<body>
    <span>Bridge Client</span>
    <input type="button" driverunittest="click" value="Run Bridge Client Tests" onclick="RunBridgeClientTests()">
    <div>
        <div>Handshake: <span id="result-handshake">true</span></div>
        <div>Viewport: <span id="result-viewport">true</span></div>
        <div>Missing: <span id="result-missing">true</span></div>
        <div>Delayed handshake: <span id="result-delayedHandshake">true</span></div>
        <div>Malformed: <span id="result-malformed">true</span></div>
        <div>Concurrent: <span id="result-concurrent">true</span></div>
        <div>Error: <span id="result-extensionError">true</span></div>
        <div>Clear: <span id="result-clear">true</span></div>
        <div>Failures: <span id="result-error"></span></div>
    </div>
</body>
</html>
