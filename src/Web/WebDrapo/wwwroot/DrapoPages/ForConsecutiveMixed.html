<!DOCTYPE html>
<html>
<head>
    <script src="/drapo.js"></script>
    <title>Drapo For Consecutive Mixed</title>
</head>
<body>
    <h1><span>For Consecutive Mixed</span></h1>
    <ul>
        <li d-for="x in (0..0)">X{{x}} </li>
        <li d-for="a in (0..2)">A{{a}} </li>
        <li class="sep">--</li>
        <li d-for="b in (0..2)">B{{b}} </li>
    </ul>
</body>
</html>
